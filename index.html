<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heathy Teacher - Ứng dụng học tập</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; line-height: 1.6; }
        .logo {
            width: 100px;
            height: 100px;
            background: #4CAF50; /* Thay bằng màu chủ đạo của app bạn */
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #45a049; }
        .footer { margin-top: 30px; font-size: 0.8em; color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Nếu bạn có logo, hãy thay thẻ div này bằng thẻ img -->
        <div class="logo"></div> 
        
        <h1>Heathy Teacher</h1>
        <p>Chào mừng bạn đến với nền tảng theo dõi học tập và luyện tập online dành cho học sinh.</p>

        <!-- Link này sẽ kích hoạt App Link nếu đã cài app -->
        <!-- Nếu chưa cài, nó sẽ mở đúng link này trên trình duyệt hoặc dẫn tới Store -->
        <a href="https://tenshi1123.github.io/open" class="btn">MỞ ỨNG DỤNG</a>

        <div style="margin-top: 15px;">
            <a href="https://play.google.com/store/apps/details?id=com.heathy.heathy_teacher" 
               style="color: #3498db; text-decoration: none; font-size: 0.9em;">
               Hoặc tải trên Google Play
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 Heathy Teacher Team
    </div>

</body>
</html>
