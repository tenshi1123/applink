<!DOCTYPE html>
<html>
<body>
    <script>
        var appScheme = "intent://open#Intent;scheme=my-app-scheme;package=com.example.myapp;S.browser_fallback_url=https://play.google.com/store/apps/details?id=com.example.myapp;end";
        
        // Cố gắng mở ứng dụng, nếu không được sẽ tự chuyển sang Play Store nhờ fallback_url
        window.location.href = appScheme;
    </script>
    <p>Đang chuyển hướng đến ứng dụng...</p>
</body>
</html>
